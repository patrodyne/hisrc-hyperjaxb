jakarta.persistence.jdbc.password=123456
jakarta.persistence.jdbc.url=jdbc:h2:file:./target/test-database/h2db;MODE=LEGACY;DB_CLOSE_DELAY=-1;TRACE_LEVEL_FILE=4;TIME ZONE=UTC;INIT=CREATE SCHEMA IF NOT EXISTS ejb_tests_publication
