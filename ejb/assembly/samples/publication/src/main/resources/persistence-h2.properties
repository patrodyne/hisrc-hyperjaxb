# H2 Legacy Mode: h2db database in local file.
eclipselink.target-database=org.eclipse.persistence.platform.database.H2Platform
hibernate.query.mutation_strategy.global_temporary.create_tables=false
jakarta.persistence.jdbc.driver=org.h2.Driver
jakarta.persistence.jdbc.user=tester
jakarta.persistence.jdbc.password=123456
jakarta.persistence.jdbc.url=jdbc:h2:file:./target/test-database/h2db;MODE=LEGACY;DB_CLOSE_DELAY=-1;TRACE_LEVEL_FILE=1;TIME ZONE=UTC;INIT=CREATE SCHEMA IF NOT EXISTS ejb_samples_publication
#jakarta.persistence.jdbc.url=jdbc:h2:file:./target/test-database/h2db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;TRACE_LEVEL_FILE=4;INIT=CREATE SCHEMA IF NOT EXISTS ejb_samples_publication

